<!DOCTYPE html>
<html><head><meta charset="UTF-8"></head><body>
<iframe id="f" src="/index.html" style="width:430px;height:900px"></iframe>
<pre id="out"></pre>
<script>
const log = [];
const A = (name, cond) => log.push((cond ? 'PASS' : 'FAIL') + ' ' + name);
const sleep = (ms) => new Promise((r) => setTimeout(r, ms));
const f = document.getElementById('f');

async function run() {
  await new Promise((r) => { f.onload = r; });
  await sleep(300);
  let d = f.contentDocument;
  A('home renders brand', !!d.querySelector('.brand'));
  A('home has 5 option inputs', d.querySelectorAll('.opt-in').length === 5);

  // --- paste a numbered list into option 1 ---
  const W = f.contentWindow;
  const dt = new W.DataTransfer();
  dt.setData('text/plain', '1 tacos\n2 burger place\n3. mcdonalds\n4 eat at home\n5 oyster bar');
  const pe = new W.ClipboardEvent('paste', { clipboardData: dt, bubbles: true, cancelable: true });
  d.querySelector('#opt0').dispatchEvent(pe);
  await sleep(200);
  A('paste fills the five', d.querySelector('#opt0').value === 'tacos' && d.querySelector('#opt4').value === 'oyster bar');

  // --- compose ---
  d.querySelector('#title-in').value = 'Dinner Friday';
  d.querySelector('#name-in').value = 'Tyler';
  d.querySelector('#note-in').value = 'surprise me, somewhere warm';
  const opts = ['Sushi Yasaka', 'Thai Market', 'Pisticci', 'Shake Shack', 'Taqueria y Fonda'];
  opts.forEach((o, i) => { d.querySelector('#opt' + i).value = o; });

  // --- emoji picker: explicit pick on option 4, option 5 becomes emoji-only ---
  d.querySelectorAll('.emoji-btn')[3].click();
  await sleep(100);
  A('emoji palette opens', !!d.querySelector('.emoji-palette'));
  d.querySelector('.pal-cell[data-e="🌮"]').click();
  await sleep(100);
  A('palette closes on pick', !d.querySelector('.emoji-palette'));
  A('picked emoji shows on its button', d.querySelectorAll('.emoji-btn')[3].textContent === '🌮');
  d.querySelectorAll('.emoji-btn')[4].click();
  await sleep(100);
  d.querySelector('.pal-cell[data-e="🦪"]').click();
  await sleep(100);
  d.querySelector('#opt4').value = ''; // just the emoji — still a valid option
  d.querySelector('[data-action="compose-share"]').click();
  await sleep(400);
  const cutUrl = d.querySelector('#compose-linkrow #share-url')?.dataset.url || '';
  A('compose generates cut link', cutUrl.includes('#'));
  log.push('CUTURL ' + cutUrl);

  // --- cut (hash change, same document) ---
  f.contentWindow.location.href = cutUrl;
  await sleep(400);
  d = f.contentDocument;
  A('cut renders 5 choices', d.querySelectorAll('.choices .choice').length === 5);
  A('cut has 5 map pins', d.querySelectorAll('.choices .mapbtn').length === 5);
  A('map view deferred (no panel)', !d.querySelector('#geo-panel'));
  A('cut names the lister', d.body.textContent.includes('Tyler listed 5'));
  A('cut shows the lister note', !!d.querySelector('.round-note') && d.querySelector('.round-note').textContent.includes('surprise me, somewhere warm'));
  A('cut emoji matched sushi', d.body.textContent.includes('🍣'));
  const shakeRow = [...d.querySelectorAll('.choices .choice')].find((c) => c.querySelector('.emoji').textContent === '🌮');
  A('picked emoji overrides auto, label stays clean', !!shakeRow && shakeRow.querySelector('.label').textContent === 'Shake Shack');
  A('emoji-only option is a full choice', [...d.querySelectorAll('.choices .choice')].some((c) => c.querySelector('.emoji').textContent === '🦪'));
  A('map buttons use external-link icon', d.querySelectorAll('.choices .mapbtn svg').length === 5);
  A('cut cta starts disabled', d.querySelector('#cta').disabled === true);
  const cards = d.querySelectorAll('.choices .choice');
  cards[0].click(); cards[1].click();
  await sleep(150);
  cards[2].click(); // third keep must be refused
  await sleep(150);
  A('third keep refused', d.querySelectorAll('.choice.kept').length === 2);
  A('cta enabled at exactly 2', d.querySelector('#cta').disabled === false);
  A('non-kept rows gray out', d.querySelectorAll('.choices .dimmed-row').length === 3);
  d.querySelector('#cutter-name').value = 'Partner';
  d.querySelector('#cut-note').value = 'number 3 was also fine';
  d.querySelector('[data-action="cut-share"]').click();
  await sleep(400);
  const closeUrl = d.querySelector('#cut-linkrow #share-url')?.dataset.url || '';
  A('cut generates close link', closeUrl.includes('#'));
  log.push('CLOSEURL ' + closeUrl);

  // --- close ---
  f.contentWindow.location.href = closeUrl;
  await sleep(400);
  d = f.contentDocument;
  A('close renders exactly 2', d.querySelectorAll('#final-choices .choice').length === 2);
  A('close names the cutter', d.body.textContent.includes('Partner kept 2'));
  A('close shows the note passed back', !!d.querySelector('.round-note') && d.querySelector('.round-note').textContent.includes('number 3 was also fine'));
  A('cut three ghosted below, same style', d.querySelectorAll('#ghost-rows .ghost-row').length === 3 &&
    d.body.textContent.includes('Pisticci'));
  d.querySelectorAll('#final-choices .choice')[0].click();
  await sleep(500);
  A('winner card appears', !!d.querySelector('#close-after .lede'));
  A('undo offered', !!d.querySelector('[data-action="undo-final"]'));
  d.querySelector('#close-note').value = 'it was close';
  d.querySelector('[data-action="close-share"]').click();
  await sleep(400);
  const doneUrl = d.querySelector('#close-linkrow #share-url')?.dataset.url || '';
  A('close generates done link', doneUrl.includes('#'));
  log.push('DONEURL ' + doneUrl);

  // --- done ---
  f.contentWindow.location.href = doneUrl;
  await sleep(600);
  d = f.contentDocument;
  A('done shows trophy', !!d.querySelector('.trophy'));
  A('done shows winner', d.body.textContent.includes('Sushi Yasaka'));
  A('done shows the verdict note', !!d.querySelector('.round-note') && d.querySelector('.round-note').textContent.includes('it was close'));
  A('done credits the ritual', d.body.textContent.includes('kept 2'));

  // --- history + broken link ---
  f.contentWindow.location.href = '/index.html#not-a-real-payload';
  await sleep(400);
  d = f.contentDocument;
  A('broken link handled kindly', d.body.textContent.includes("didn't survive"));
  f.contentWindow.location.href = '/index.html';
  await sleep(400);
  d = f.contentDocument;
  A('history remembers rounds', d.body.textContent.includes('Recent rounds'));
  A('history logged the win', d.body.textContent.includes('🏆'));

  finish();
}
function finish() {
  document.getElementById('out').textContent = log.join('\n');
  document.title = 'SMOKE:' + (log.filter((l) => l.startsWith('FAIL')).length === 0 ? 'PASS' : 'FAIL');
}
run().catch((e) => { log.push('ERROR ' + (e.stack || e)); finish(); });
</script>
</body></html>
