<body>
<div id="app"></div>
<canvas id="confetti"></canvas>
<div class="toast" id="toast"></div>

<script>
'use strict';
/* ============================================================
   5 · 2 · 1 — a two-person decision ritual with zero backend.
   The whole round travels inside the link. Nothing is stored
   anywhere except the two phones it belongs to.
   Payload (hash fragment, base64url of JSON):
     { v:1, s:'cut'|'close'|'done', t:title, l:lister, c:cutter,
       o:[options], k:[keptIdx,keptIdx], w:winnerIdx }
   ============================================================ */

const $ = (sel) => document.querySelector(sel);
const app = $('#app');

/* ---------- storage (fails soft in private mode) ---------- */
const store = {
  get(k, fallback) { try { const v = localStorage.getItem('521.' + k); return v === null ? fallback : JSON.parse(v); } catch { return fallback; } },
  set(k, v) { try { localStorage.setItem('521.' + k, JSON.stringify(v)); } catch {} },
};

/* ---------- codec: JSON → UTF-8 → base64url ---------- */
function encodePayload(obj) {
  const bytes = new TextEncoder().encode(JSON.stringify(obj));
  let bin = '';
  for (const b of bytes) bin += String.fromCharCode(b);
  return btoa(bin).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
}
function decodePayload(str) {
  let b64 = str.replace(/-/g, '+').replace(/_/g, '/');
  while (b64.length % 4) b64 += '=';
  const bin = atob(b64);
  const bytes = Uint8Array.from(bin, (c) => c.charCodeAt(0));
  return JSON.parse(new TextDecoder().decode(bytes));
}
const linkFor = (payload) =>
  location.origin + location.pathname + '#' + encodePayload(payload);

/* ---------- emoji matcher ---------- */
const EMOJI_RULES = [
  [/sushi|omakase|sashimi|izakaya|japanese/i, '🍣'],
  [/ramen|noodle|pho\b|udon|soba/i, '🍜'],
  [/pizza|slice/i, '🍕'],
  [/taco|taqueria|mexican|burrito|quesadilla|cantina|pastor/i, '🌮'],
  [/burger|smash|shake shack/i, '🍔'],
  [/thai|curry|indian|masala/i, '🍛'],
  [/pasta|italian|trattoria|osteria/i, '🍝'],
  [/dumpling|dim ?sum|chinese|szechuan|sichuan|bao\b/i, '🥟'],
  [/korean|kbbq|bulgogi|bibimbap/i, '🍖'],
  [/bbq|barbecue|smokehouse|steak|grill/i, '🥩'],
  [/oyster|seafood|fish|crab|lobster|clam/i, '🦪'],
  [/poke|hawaiian/i, '🥢'],
  [/tapas|spanish|paella/i, '🥘'],
  [/french|bistro|brasserie/i, '🥖'],
  [/mediterranean|greek|gyro|falafel|shawarma|halal/i, '🥙'],
  [/vietnamese|banh/i, '🥢'],
  [/wine|vino|cocktail|speakeasy|\bbar\b/i, '🍷'],
  [/beer|brewery|\bpub\b|taproom/i, '🍺'],
  [/coffee|cafe|café|espresso/i, '☕'],
  [/brunch|breakfast|pancake|waffle|diner|egg/i, '🥞'],
  [/bagel|deli|sandwich|hoagie/i, '🥪'],
  [/salad|vegan|veggie|vegetarian|bowl/i, '🥗'],
  [/chicken|wing/i, '🍗'],
  [/soup|stew|hot ?pot/i, '🍲'],
  [/dessert|ice ?cream|gelato|sundae/i, '🍦'],
  [/bakery|croissant|pastry|patisserie/i, '🥐'],
  [/donut|doughnut/i, '🍩'],
  [/movie|film|cinema/i, '🍿'],
  [/theater|theatre|broadway|comedy|show\b/i, '🎭'],
  [/museum|gallery|exhibit/i, '🖼️'],
  [/park\b|walk|hike|picnic/i, '🌳'],
  [/game|arcade|bowling|golf/i, '🎲'],
  [/concert|music|jazz|gig\b/i, '🎶'],
];
const EMOJI_FALLBACK = ['🍽️', '✨', '🎲', '🌟', '💫', '🧭', '🎁'];
/* plain Google Maps search deep link — no API, no key; iOS opens the Maps app */
const mapsUrl = (name) => 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(name);
function emojiFor(text, i) {
  for (const [re, e] of EMOJI_RULES) if (re.test(text)) return e;
  return EMOJI_FALLBACK[i % EMOJI_FALLBACK.length];
}

/* ---------- tiny ui helpers ---------- */
const esc = (s) => String(s ?? '').replace(/[&<>"']/g, (c) =>
  ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
let toastTimer;
function toast(msg) {
  const t = $('#toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}
function stepper(now) { // now: 5, 2, 1, or 0 (done)
  const states = { 5: 0, 2: 1, 1: 2, 0: 3 };
  const pos = states[now];
  const cls = (i) => (i < pos ? 'past' : i === pos ? 'now' : '');
  return `<div class="stepper">
    <div class="step ${cls(0)}">5</div><div class="step-line ${pos > 0 ? 'past' : ''}"></div>
    <div class="step ${cls(1)}">2</div><div class="step-line ${pos > 1 ? 'past' : ''}"></div>
    <div class="step ${cls(2)}">1</div>
  </div>`;
}
const houseRule = `<p class="house-rule">House rule — <b>say what you actually want.</b><br>It works out in the end.</p>`;

/* ---------- share: copy-first, share sheet as the optional extra ---------- */
let lastMsg = '';
async function finishShare(msg, ctaSel, doneLabel) {
  lastMsg = msg;
  const alt = document.querySelector('[data-action="share-alt"]');
  if (alt && navigator.share) alt.hidden = false;
  let ok = true;
  try { await navigator.clipboard.writeText(msg); } catch { ok = false; }
  const cta = document.querySelector(ctaSel);
  if (ok) { toast('Copied — paste it anywhere'); if (cta) cta.textContent = doneLabel; }
  else { toast('Copy blocked — use the link row below'); }
}
function linkRowHTML(url) {
  return `<button class="linkrow" data-action="copy-url" data-url="${esc(url)}" id="share-url">
    🔗 <span class="trunc">${esc(url)}</span> ⧉</button>`;
}

/* ---------- history ---------- */
function logRound(entry) {
  const h = store.get('history', []);
  h.unshift({ ts: Date.now(), ...entry });
  store.set('history', h.slice(0, 12));
}
function fmtDay(ts) {
  const d = new Date(ts), now = new Date();
  const days = Math.floor((now - d) / 86400000);
  if (d.toDateString() === now.toDateString()) return 'today';
  if (days < 2) return 'yesterday';
  return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
}

/* ---------- confetti ---------- */
function confetti() {
  if (matchMedia('(prefers-reduced-motion: reduce)').matches) return;
  const canvas = $('#confetti');
  const ctx = canvas.getContext('2d');
  const dpr = Math.min(devicePixelRatio || 1, 2);
  canvas.width = innerWidth * dpr;
  canvas.height = innerHeight * dpr;
  ctx.scale(dpr, dpr);
  const colors = ['#E2593A', '#F2A03D', '#3E8E5A', '#7A66D9', '#4FA3D9', '#F5C542'];
  const parts = Array.from({ length: 140 }, () => ({
    x: innerWidth / 2 + (Math.random() - 0.5) * innerWidth * 0.5,
    y: innerHeight * 0.35 + (Math.random() - 0.5) * 60,
    vx: (Math.random() - 0.5) * 11,
    vy: -(4 + Math.random() * 10),
    w: 6 + Math.random() * 6,
    h: 8 + Math.random() * 8,
    rot: Math.random() * Math.PI,
    vr: (Math.random() - 0.5) * 0.3,
    color: colors[(Math.random() * colors.length) | 0],
  }));
  const t0 = performance.now();
  (function frame(t) {
    const dt = (t - t0) / 1000;
    ctx.clearRect(0, 0, innerWidth, innerHeight);
    for (const p of parts) {
      p.vy += 0.28; p.x += p.vx; p.y += p.vy; p.rot += p.vr;
      ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.rot);
      ctx.fillStyle = p.color; ctx.globalAlpha = Math.max(0, 1 - dt / 2.4);
      ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h); ctx.restore();
    }
    if (dt < 2.5) requestAnimationFrame(frame);
    else ctx.clearRect(0, 0, innerWidth, innerHeight);
  })(t0);
}

/* ============================================================
   VIEWS
   ============================================================ */
let keepSet = new Set();   // cut view selection
let finalPick = null;      // close view selection
let composeCount = 5;      // visible option slots

const OPT_PLACEHOLDERS = ['that sushi place', 'the thai spot', 'tacos obviously', 'somewhere new', 'the reliable one', 'wildcard', 'dealer’s choice'];

function renderHome() {
  const name = store.get('name', '');
  const partner = store.get('partner', '');
  const history = store.get('history', []);
  const optRows = Array.from({ length: composeCount }, (_, i) => `
    <div class="opt-row">
      <div class="opt-num">${i + 1}</div>
      <input class="text-in opt-in" id="opt${i}" maxlength="64" autocomplete="off"
             placeholder="${esc(OPT_PLACEHOLDERS[i % OPT_PLACEHOLDERS.length])}">
    </div>`).join('');

  app.innerHTML = `
    <div class="hero">
      <div class="brand">5<span class="dot">·</span>2<span class="dot">·</span>1</div>
      <p class="tagline">You list five. They keep two. You pick the winner.</p>
    </div>

    <div class="card">
      <h2>Start a round</h2>
      <div class="field-label">Your five <span style="opacity:.6">(paste a numbered list — it fills itself)</span></div>
      ${optRows}
      ${composeCount < 7 ? '<button class="add-opt" data-action="add-option">+ one more</button>' : ''}
      <div class="duo">
        <div>
          <div class="field-label">Title — optional</div>
          <input class="text-in" id="title-in" maxlength="48" autocomplete="off" placeholder="Dinner tonight">
        </div>
        <div>
          <div class="field-label">Your name — optional</div>
          <input class="text-in" id="name-in" maxlength="24" autocomplete="off" placeholder="you" value="${esc(name)}">
        </div>
      </div>
      <div class="chips">
        <button class="chip" data-action="chip-title" data-title="Dinner tonight">🍽️ Dinner</button>
        <button class="chip" data-action="chip-title" data-title="Takeout">🥡 Takeout</button>
        <button class="chip" data-action="chip-title" data-title="Movie night">🍿 Movie</button>
        <button class="chip" data-action="chip-title" data-title="Date night">✨ Date night</button>
      </div>
      <div class="form-error" id="form-error"></div>
      <button class="cta" data-action="compose-share" id="cta">Copy the link — they keep 2</button>
      <button class="share-alt" data-action="share-alt" hidden>📤 or send with the share sheet</button>
      <div id="compose-linkrow"></div>
    </div>

    <div class="card">
      <h2>Who lists tonight?</h2>
      <div class="coin-area">
        <div class="coin-scene"><div class="coin" id="coin">
          <div class="face front" id="coin-front">${esc((name || 'A')[0].toUpperCase())}</div>
          <div class="face back" id="coin-back">${esc((partner || 'B')[0].toUpperCase())}</div>
        </div></div>
        <div class="coin-side">
          <div class="coin-names">
            <input class="text-in" id="coin-me" maxlength="24" placeholder="you" value="${esc(name)}">
            <input class="text-in" id="coin-them" maxlength="24" placeholder="them" value="${esc(partner)}">
          </div>
          <button class="btn-small" data-action="flip-coin" id="flip-btn">Flip</button>
          <div class="coin-result" id="coin-result"></div>
        </div>
      </div>
    </div>

    ${history.length ? `<div class="card"><h2>Recent rounds</h2>${history.map((h, i) => `
      <button class="hist-row" data-action="open-history" data-i="${i}">
        <span class="hist-emoji">${h.winner ? '🏆' : emojiFor(h.title || '', i)}</span>
        <span class="hist-main">
          <span class="hist-title">${esc(h.title || 'Untitled round')}</span>
          <span class="hist-state">${h.winner ? esc(h.winner) : ({ sent: 'sent — waiting on their 2', cut: 'you kept 2 — their call', closed: 'decided', done: 'decided' }[h.stage] || '')}</span>
        </span>
        <span class="hist-date">${fmtDay(h.ts)}</span>
      </button>`).join('')}</div>` : ''}

    ${houseRule}
  `;
}

function renderCut(p) {
  const myName = store.get('name', '');
  const forSelf = myName && myName === p.l;
  keepSet = new Set();
  app.innerHTML = `
    ${stepper(2)}
    <div class="card" style="text-align:center">
      <p class="lede">${p.l ? esc(p.l) + ' listed ' + p.o.length + '.' : 'Your cut.'}</p>
      <p class="sub">Keep the <b>2</b> you actually want.</p>
      ${p.t ? `<span class="title-chip">${emojiFor(p.t, 0)} ${esc(p.t)}</span>` : ''}
      ${forSelf ? `<div class="hint">This is your own list — this link was meant for your partner 😉</div>` : ''}
    </div>
    <div class="choices">
      ${p.o.map((opt, i) => `
        <div class="choice-row">
          <button class="choice" data-action="toggle-keep" data-i="${i}" style="animation-delay:${i * 55}ms">
            <span class="emoji">${emojiFor(opt, i)}</span>
            <span class="label">${esc(opt)}</span>
            <span class="badge">KEEP ✓</span>
          </button>
          <a class="mapbtn" href="${mapsUrl(opt)}" target="_blank" rel="noopener" aria-label="open ${esc(opt)} in Maps">📍</a>
        </div>`).join('')}
    </div>
    <div class="keep-counter" id="keep-counter">0 of 2 kept</div>
    <div class="card">
      <div class="field-label">Your name — optional</div>
      <input class="text-in" id="cutter-name" maxlength="24" placeholder="you" value="${esc(forSelf ? '' : myName)}">
      <button class="cta" data-action="cut-share" id="cta" disabled>Copy the link back</button>
      <button class="share-alt" data-action="share-alt" hidden>📤 or send with the share sheet</button>
      <div id="cut-linkrow"></div>
    </div>
    <details class="explain"><summary>First time? How 5·2·1 works</summary>
      <p>It's a tiny ritual for deciding as a pair: one person lists five options, the other keeps their favorite two, and the lister picks the winner from those. Be honest about what you want — no strategic picks, no guessing what they'd prefer. It works out in the end.</p>
    </details>
    ${houseRule}
  `;
}

function renderClose(p) {
  const kept = p.k.map((i) => ({ i, text: p.o[i] }));
  finalPick = null;
  app.innerHTML = `
    ${stepper(1)}
    <div class="card" style="text-align:center">
      <p class="lede">${p.c ? esc(p.c) + ' kept 2.' : 'Down to 2.'}</p>
      <p class="sub">Your call${p.l ? ', ' + esc(p.l) : ''}. Pick the winner.</p>
      ${p.t ? `<span class="title-chip">${emojiFor(p.t, 0)} ${esc(p.t)}</span>` : ''}
    </div>
    <div class="choices" id="final-choices">
      ${kept.map(({ i, text }, j) => `
        <div class="choice-row">
          <button class="choice" data-action="pick-final" data-i="${i}" style="animation-delay:${j * 90}ms">
            <span class="emoji">${emojiFor(text, i)}</span>
            <span class="label">${esc(text)}</span>
            <span class="badge">🏆</span>
          </button>
          <a class="mapbtn" href="${mapsUrl(text)}" target="_blank" rel="noopener" aria-label="open ${esc(text)} in Maps">📍</a>
        </div>`).join('')}
    </div>
    <div id="close-after"></div>
    <details class="explain"><summary>The other three</summary>
      <p>${p.o.filter((_, i) => !p.k.includes(i)).map(esc).join(' · ') || '—'}</p>
    </details>
    ${houseRule}
  `;
}

function renderDone(p) {
  const winner = p.o[p.w];
  app.innerHTML = `
    ${stepper(0)}
    <div class="card winner-stage">
      <div class="trophy">🏆</div>
      <div class="winner-name">${esc(winner)}</div>
      <p class="winner-sub">${p.t ? esc(p.t) + ' — ' : ''}decided.</p>
      <p class="ritual-note">${p.l && p.c
        ? `${esc(p.l)} listed ${p.o.length} · ${esc(p.c)} kept 2 · ${esc(p.l)} picked the one`
        : `listed ${p.o.length} · kept 2 · picked 1 — the 5·2·1 way`}</p>
      <button class="cta" data-action="done-restart">Start the next round</button>
    </div>
    <details class="explain"><summary>The full five</summary>
      <p>${p.o.map((o, i) => (i === p.w ? '🏆 ' : '') + esc(o)).join(' · ')}</p>
    </details>
    ${houseRule}
  `;
  logRound({ title: p.t, stage: 'done', winner });
  setTimeout(confetti, 350);
}

function renderBroken() {
  app.innerHTML = `
    <div class="hero">
      <div class="brand">5<span class="dot">·</span>2<span class="dot">·</span>1</div>
      <p class="tagline">Hmm — that link didn't survive the trip.</p>
    </div>
    <div class="card" style="text-align:center">
      <p class="sub">Ask them to send it again, or start fresh.</p>
      <button class="cta" data-action="done-restart">Start a round</button>
    </div>`;
}

/* ============================================================
   ACTIONS
   ============================================================ */
function currentPayload() {
  const hash = location.hash.slice(1);
  if (!hash) return null;
  return decodePayload(hash);
}

function composeShare() {
  const err = $('#form-error');
  err.classList.remove('show');
  const name = $('#name-in').value.trim();
  const title = $('#title-in').value.trim();
  const opts = [];
  for (let i = 0; i < composeCount; i++) {
    const v = $('#opt' + i)?.value.trim();
    if (v) opts.push(v);
  }
  if (opts.length < 3) { err.textContent = 'Give them at least 3 options (5 is the ritual).'; err.classList.add('show'); return; }
  const lower = opts.map((o) => o.toLowerCase());
  if (new Set(lower).size !== lower.length) { err.textContent = 'Two of those are the same — every option should be distinct.'; err.classList.add('show'); return; }
  if (name) store.set('name', name);

  const payload = { v: 1, s: 'cut', t: title, l: name, o: opts };
  const url = linkFor(payload);
  $('#compose-linkrow').innerHTML = linkRowHTML(url);
  logRound({ title, stage: 'sent', url });
  const head = title ? `5·2·1 — ${title}. ` : '5·2·1 — ';
  const menu = opts.map((o, i) => `${i + 1} ${o}`).join('\n');
  finishShare(`${head}I listed ${opts.length}, you keep 2:\n${menu}\n${url}`, '#cta', 'Copied ✓ — now paste it to them');
}

function toggleKeep(btn) {
  const i = Number(btn.dataset.i);
  if (keepSet.has(i)) { keepSet.delete(i); btn.classList.remove('kept'); }
  else if (keepSet.size < 2) { keepSet.add(i); btn.classList.add('kept'); }
  else { toast('Only 2 — swap one out first'); return; }
  const counter = $('#keep-counter');
  counter.innerHTML = keepSet.size === 2 ? '<span class="full">2 of 2 kept ✓</span>' : `${keepSet.size} of 2 kept`;
  $('#cta').disabled = keepSet.size !== 2;
}

function cutShare() {
  const p = currentPayload();
  const cutter = $('#cutter-name').value.trim();
  if (cutter) store.set('name', cutter);
  const kept = [...keepSet].sort((a, b) => a - b);
  const payload = { ...p, s: 'close', c: cutter, k: kept };
  const url = linkFor(payload);
  $('#cut-linkrow').innerHTML = linkRowHTML(url);
  logRound({ title: p.t, stage: 'cut', url });
  const head = p.t ? `5·2·1 — ${p.t}. ` : '5·2·1 — ';
  finishShare(`${head}I kept: ${kept.map((i) => p.o[i]).join(' + ')}. Your call:\n${url}`, '#cta', 'Copied ✓ — paste it back');
}

function pickFinal(btn) {
  if (finalPick !== null) return;
  finalPick = Number(btn.dataset.i);
  const p = currentPayload();
  document.querySelectorAll('#final-choices .choice').forEach((c) => {
    if (Number(c.dataset.i) === finalPick) c.classList.add('winner', 'kept');
    else c.classList.add('dimmed');
    c.disabled = true;
  });
  confetti();
  const payload = { ...p, s: 'done', w: finalPick };
  const url = linkFor(payload);
  logRound({ title: p.t, stage: 'closed', winner: p.o[finalPick], url });
  $('#close-after').innerHTML = `
    <div class="card" style="text-align:center">
      <p class="lede">🏆 ${esc(p.o[finalPick])}</p>
      <p class="sub">Now the sacred final step: tell ${esc(p.c || 'them')}.</p>
      <button class="cta" data-action="close-share" id="close-cta">Copy the verdict${p.c ? ' for ' + esc(p.c) : ''}</button>
      <button class="cta secondary" data-action="undo-final">wait, let me rethink</button>
      <button class="share-alt" data-action="share-alt" hidden>📤 or send with the share sheet</button>
      <div id="close-linkrow"></div>
    </div>`;
  $('#close-after').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function closeShare() {
  const p = currentPayload();
  const payload = { ...p, s: 'done', w: finalPick };
  const url = linkFor(payload);
  $('#close-linkrow').innerHTML = linkRowHTML(url);
  const head = p.t ? `5·2·1 — ${p.t}: ` : '5·2·1 — ';
  finishShare(`${head}🏆 ${p.o[finalPick]}!\n${url}`, '#close-cta', 'Copied ✓ — go tell them');
}

function flipCoin() {
  const me = $('#coin-me').value.trim() || 'You';
  const them = $('#coin-them').value.trim() || 'Them';
  store.set('name', $('#coin-me').value.trim() || store.get('name', ''));
  store.set('partner', $('#coin-them').value.trim() || store.get('partner', ''));
  $('#coin-front').textContent = me[0].toUpperCase();
  $('#coin-back').textContent = them[0].toUpperCase();
  const coin = $('#coin');
  const tails = Math.random() < 0.5;
  const result = $('#coin-result');
  result.textContent = '';
  coin.style.transition = 'none';
  coin.style.transform = 'rotateY(0deg)';
  requestAnimationFrame(() => requestAnimationFrame(() => {
    coin.style.transition = '';
    coin.style.transform = `rotateY(${1800 + (tails ? 180 : 0)}deg)`;
    setTimeout(() => {
      result.textContent = `${tails ? them : me} lists 5 ✨`;
    }, 1750);
  }));
}

/* ---------- event delegation ---------- */
app.addEventListener('click', (e) => {
  const el = e.target.closest('[data-action]');
  if (!el) return;
  const act = el.dataset.action;
  if (act === 'chip-title') { $('#title-in').value = el.dataset.title; }
  else if (act === 'add-option') { composeCount = Math.min(7, composeCount + 1); const vals = saveComposeValues(); renderHome(); restoreComposeValues(vals); }
  else if (act === 'compose-share') composeShare();
  else if (act === 'toggle-keep') toggleKeep(el);
  else if (act === 'cut-share') cutShare();
  else if (act === 'pick-final') pickFinal(el);
  else if (act === 'undo-final') { finalPick = null; route(); }
  else if (act === 'close-share') closeShare();
  else if (act === 'done-restart') { location.hash = ''; composeCount = 5; route(); }
  else if (act === 'flip-coin') flipCoin();
  else if (act === 'share-alt') { if (navigator.share && lastMsg) navigator.share({ text: lastMsg }).catch(() => {}); }
  else if (act === 'copy-url') {
    navigator.clipboard?.writeText(el.dataset.url).then(() => toast('Link copied ✓'), () => toast('Long-press the link to copy'));
  }
  else if (act === 'open-history') {
    const h = store.get('history', [])[Number(el.dataset.i)];
    if (h?.url) location.href = h.url;
  }
});
function saveComposeValues() {
  return {
    title: $('#title-in')?.value, name: $('#name-in')?.value,
    opts: Array.from({ length: composeCount }, (_, i) => $('#opt' + i)?.value ?? ''),
  };
}
function restoreComposeValues(v) {
  if (!v) return;
  if ($('#title-in')) $('#title-in').value = v.title ?? '';
  if ($('#name-in')) $('#name-in').value = v.name ?? '';
  v.opts.forEach((val, i) => { if ($('#opt' + i)) $('#opt' + i).value = val; });
}
/* enter → next option field */
app.addEventListener('keydown', (e) => {
  if (e.key !== 'Enter' || !e.target.classList?.contains('opt-in')) return;
  e.preventDefault();
  const i = Number(e.target.id.slice(3));
  const next = $('#opt' + (i + 1));
  if (next) next.focus();
  else e.target.blur();
});
/* paste a numbered list into any option field → fill the five */
app.addEventListener('paste', (e) => {
  const t = e.target;
  if (!t.classList || !t.classList.contains('opt-in')) return;
  const text = e.clipboardData?.getData('text') ?? '';
  if (!text.includes('\n')) return;
  e.preventDefault();
  const raw = text.split('\n').map((s) => s.trim()).filter(Boolean);
  if (!raw.length) return;
  // strip leading "1", "2.", "3)" only when they're a real 1..n enumeration ("5 Guys" survives)
  const nums = raw.map((s) => { const m = s.match(/^(\d+)[\s.):\-]+/); return m ? Number(m[1]) : null; });
  const sequential = nums.length > 1 && nums.every((n, i) => n === i + 1);
  const lines = sequential ? raw.map((s) => s.replace(/^\d+[\s.):\-]+\s*/, '')) : raw;
  const start = Number(t.id.slice(3)) || 0;
  const needed = Math.min(7, start + lines.length);
  if (needed > composeCount) {
    const vals = saveComposeValues();
    composeCount = needed;
    renderHome();
    restoreComposeValues(vals);
  }
  lines.slice(0, 7 - start).forEach((l, j) => { const el = $('#opt' + (start + j)); if (el) el.value = l.slice(0, 64); });
  toast('Filled from your list ✂️');
});

/* number keys toggle choices (desktop nicety) */
document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT') return;
  const n = Number(e.key);
  if (n >= 1 && n <= 7) {
    const btn = document.querySelectorAll('.choices .choice')[n - 1];
    if (btn && !btn.disabled) btn.click();
  }
});

/* ---------- router ---------- */
function route() {
  keepSet = new Set(); finalPick = null;
  let p = null;
  const hash = location.hash.slice(1);
  if (hash) {
    try { p = decodePayload(hash); } catch { renderBroken(); return; }
  }
  if (!p) { renderHome(); document.title = '5 · 2 · 1'; return; }
  if (p.s === 'cut' && Array.isArray(p.o) && p.o.length >= 2) { renderCut(p); document.title = `5·2·1 — ${p.t || 'your cut'}`; }
  else if (p.s === 'close' && Array.isArray(p.k) && p.k.length === 2) { renderClose(p); document.title = `5·2·1 — ${p.t ? p.t + ' · ' : ''}your pick`; }
  else if (p.s === 'done' && Number.isInteger(p.w) && p.o?.[p.w] !== undefined) { renderDone(p); document.title = `5·2·1 — 🏆 ${p.o[p.w]}`; }
  else renderBroken();
  scrollTo(0, 0);
}
window.addEventListener('hashchange', route);
route();
</script>
